_schema-version: "3.2"
ID: fiori-sample-app
version: 0.0.1
 
modules:
  - name: fiori-sample-app
    type: html5
    path: .
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
 
  - name: fiori-sample-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: fiori-html5-host
    build-parameters:
      content:
        - source: dist
          target: resources/fiori-sample-app
 
resources:
  - name: fiori-html5-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
