ID: fiori-sample-app
_schema-version: "3.1"
version: 1.0.0
 
modules:
  - name: fiori-sample-app
    type: html5
    path: .                # root folder
    build-parameters:
      builder: npm         # default pipeline uses npm builder
      build-result: webapp # <- pipeline expects webapp folder content
    requires:
      - name: html5-repo-host
 
resources:
  - name: html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
