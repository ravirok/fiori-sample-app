ID: fiori-sample-app
_schema-version: "3.1"
version: 1.0.0
 
modules:
 
  # HTML5 app module
  - name: fiori-sample-app
    type: html5
    path: .                       # points to repo root
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
        # Ensure dist folder is at root
        - mv dist ../dist_temp || true
        - mkdir -p dist
        - cp -r ../dist_temp/* dist/ || true
      build-result: dist
    requires:
      - name: html5-repo-host
 
  # Fiori content module for packaging
  - name: fiori-content
    type: com.sap.application.content
    path: .
    requires:
      - name: html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: fiori-sample-app
          artifacts:
            - dist/**
          target-path: resources/
 
resources:
  - name: html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

